# infra/nginx/galley.conf
#
# Optional reverse proxy for Sevastolink Galley Archive.
#
# Routes:
#   /api/*          → FastAPI backend  (galley-api:8000)
#   /docs, /redoc   → FastAPI auto-docs
#   /*              → Vite frontend    (galley-web:3000)
#
# When to use:
#   - You want a single URL/port for the whole app (useful on a home LAN)
#   - You want to access the archive from other devices without typing a port
#
# When not to use:
#   - Normal localhost development — direct :3000 and :8000 access is simpler
#
# Port: configured via NGINX_PORT in .env (default 8080).
# Activated via the "proxy" Docker Compose profile: make up-proxy

upstream galley_api {
    server galley-api:8000;
}

upstream galley_web {
    server galley-web:3000;
}

server {
    listen 80;
    server_name _;  # accepts any hostname — suitable for localhost and home-LAN IPs

    # ── API ───────────────────────────────────────────────────────────────────

    location /api/ {
        proxy_pass            http://galley_api;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
    }

    # FastAPI auto-generated docs
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass            http://galley_api;
        proxy_set_header      Host              $host;
    }

    # ── Frontend ──────────────────────────────────────────────────────────────

    location / {
        proxy_pass            http://galley_web;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        # WebSocket headers — required for Vite HMR (hot reload) through the proxy
        proxy_http_version    1.1;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        "upgrade";
        proxy_read_timeout    60s;
    }
}
