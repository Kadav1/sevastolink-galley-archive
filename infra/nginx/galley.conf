# infra/nginx/galley.conf
#
# Optional reverse proxy for Sevastolink Galley Archive.
#
# Routes:
#   /api/*          → FastAPI backend  (galley-api:8000)
#   /docs, /redoc   → FastAPI auto-docs
#   /*              → Vite frontend    (galley-web:3000)
#
# When to use:
#   - You want a single URL/port for the whole app (useful on a home LAN)
#   - You want to access the archive from other devices without typing a port
#
# When not to use:
#   - Normal localhost development — direct :3000 and :8000 access is simpler
#
# Port: configured via NGINX_PORT in .env (default 8080).
# Activated via the "proxy" Docker Compose profile: make up-proxy

# ── Upload size ───────────────────────────────────────────────────────────────
# Allow up to 50 MB for media attachments (recipe images, scanned PDF sources).
# Increase if you regularly work with very large PDFs or RAW image files.
client_max_body_size 50M;

upstream galley_api {
    server galley-api:8000;
}

upstream galley_web {
    server galley-web:3000;
}

server {
    listen 80;
    server_name _;  # accepts any hostname — suitable for localhost and home-LAN IPs

    # ── Security headers ──────────────────────────────────────────────────────
    # Applied to every response proxied through nginx.

    # Prevent MIME-type sniffing — browser must honour the declared Content-Type.
    add_header X-Content-Type-Options "nosniff" always;

    # Disallow embedding in iframes entirely (no use case here; prevents clickjacking).
    add_header X-Frame-Options "DENY" always;

    # Control referrer leakage: send origin only on same-origin, nothing cross-origin.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser feature APIs — none needed for a local recipe archive.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy:
    #   default-src 'self'       — all resources must come from this origin
    #   script-src  'self' 'unsafe-inline'  — Vite injects inline bootstrap scripts
    #   style-src   'self' 'unsafe-inline'  — inline styles used throughout the SPA
    #   img-src     'self' data: blob:      — data URIs for previews, blob: for object URLs
    #   connect-src 'self'       — XHR / fetch limited to same origin (/api/*)
    #   font-src    'self'
    #   frame-ancestors 'none'   — belt-and-suspenders alongside X-Frame-Options
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; frame-ancestors 'none';"
        always;

    # ── API ───────────────────────────────────────────────────────────────────

    location /api/ {
        proxy_pass            http://galley_api;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
    }

    # FastAPI auto-generated docs
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass            http://galley_api;
        proxy_set_header      Host              $host;
    }

    # ── Frontend ──────────────────────────────────────────────────────────────

    location / {
        proxy_pass            http://galley_web;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        # WebSocket headers — required for Vite HMR (hot reload) through the proxy
        proxy_http_version    1.1;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        "upgrade";
        proxy_read_timeout    60s;
    }
}
